<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>CELCO · Scoreboard</title><style>*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;padding:28px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #1c1c1c;position:relative;}
.wm-tag{font-size:9px;font-weight:600;letter-spacing:2px;color:#666;text-transform:uppercase;margin-top:3px;}
.hdr-right{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}.hdr-date{font-size:13px;font-weight:500;color:#ff6a00;}.hdr-sub{font-size:11px;color:#777;margin-top:3px;}
.mgr-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:14px 16px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;flex-wrap:wrap;}
.mgr-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#333;margin-right:4px;}
.mgr-sep{width:1px;height:24px;background:#1e1e1e;margin:0 4px;}
.drop-trigger{display:flex;align-items:center;gap:8px;padding:7px 14px;border:1px dashed #2a2a2a;border-radius:8px;cursor:pointer;transition:all .2s;background:transparent;}
.drop-trigger:hover{border-color:#ff6a00;background:rgba(255,106,0,0.05);}.drop-trigger input{display:none;}
.drop-trigger-icon{font-size:14px;}.drop-trigger-text{font-size:11px;font-weight:500;color:#777;}
.drop-trigger:hover .drop-trigger-text{color:#ff6a00;}
.pub-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;background:#ff6a00;border:none;border-radius:8px;color:#000;font-size:11px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all .18s;margin-left:auto;}
.pub-btn:hover{background:#ff8c00;transform:translateY(-1px);}.pub-btn svg{width:13px;height:13px;flex-shrink:0;}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toggle-group{display:flex;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:4px;gap:3px;}
.tog{padding:7px 18px;border-radius:7px;font-size:11px;font-weight:600;letter-spacing:0.5px;cursor:pointer;border:none;background:transparent;color:#888;transition:all .18s;}
.tog.active{background:#ff6a00;color:#000;}.tog:hover:not(.active){background:#2a2a2a;color:#f5f5f7;}
.date-wrap{display:flex;align-items:center;gap:8px;}
.date-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#777;}
.date-inp{background:#1a1a1a;border:1px solid #333;color:#f5f5f7;border-radius:8px;padding:7px 12px;font-size:11px;font-family:inherit;outline:none;cursor:pointer;}
.date-inp:focus{border-color:#ff6a00;}.filter-info{font-size:11px;color:#555;margin-left:auto;}.filter-info span{color:#ff6a00;font-weight:600;}
.no-data{text-align:center;padding:40px 20px;color:#666;font-size:13px;}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:#111;border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;transition:transform .18s;}
.kpi:hover{transform:translateY(-2px);}.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.kpi-lbl{font-size:9px;font-weight:600;color:#777;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.kpi-val{font-size:clamp(14px,2.8vw,24px);font-weight:700;letter-spacing:-0.5px;line-height:1;color:#f5f5f7;word-break:break-all;}
.kpi-val.orange{color:#ff6a00;}.kpi-val.green{color:#4ade80;}.kpi-note{font-size:10px;color:#666;margin-top:6px;}.kpi-status{font-size:10px;font-weight:700;margin-top:5px;letter-spacing:0.5px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{background:#111;border-radius:14px;padding:20px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #1a1a1a;}
.est-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1a1a1a;}.est-row:last-child{border-bottom:none;}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ff6a00,#ff9a00);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0;}
.est-name{font-size:12px;font-weight:500;color:#e5e5ea;}.est-sub{font-size:9px;color:#777;margin-top:2px;}
.est-right{display:flex;align-items:center;margin-left:auto;gap:8px;}
.est-amt{font-size:13px;font-weight:600;color:#ff6a00;font-variant-numeric:tabular-nums;}
.rb{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;}
.r1{background:rgba(255,106,0,0.15);color:#ff6a00;}.r2{background:rgba(255,106,0,0.08);color:#cc5200;}.r3{background:#1a1a1a;color:#777;}
.bar-row{margin-bottom:14px;}.bar-row:last-child{margin-bottom:0;}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.bar-name{font-size:12px;font-weight:500;color:#e5e5ea;}.bar-amt{font-size:10px;font-weight:600;}
.bar-track{height:5px;background:#1c1c1c;border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1);width:0;}
@media(max-width:700px){body{padding:14px;}.kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;}.two-col{grid-template-columns:1fr !important;}.kpi-val{font-size:clamp(14px,5vw,22px);}.mgr-bar{gap:6px;padding:10px 12px;}.filter-bar{gap:8px;}.toggle-group{flex-wrap:wrap;}.tog{padding:6px 12px;font-size:10px;}.hdr{flex-wrap:wrap;gap:8px;}.est-row{flex-wrap:wrap !important;padding:14px 0 !important;}.est-right{width:100% !important;flex-wrap:nowrap;gap:6px;margin-left:0 !important;}.col-bar{flex:1 1 auto !important;width:auto !important;min-width:0 !important;}.col-amount{text-align:left !important;}.col-medal{width:22px;}.card{padding:14px;}.groups-card{padding:14px;}}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a;}.cat-row:last-child{border-bottom:none;}
.cat-left{display:flex;align-items:center;gap:8px;}.cat-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cat-name{font-size:12px;font-weight:500;color:#e5e5ea;}.cat-sub{font-size:9px;color:#777;margin-top:1px;}.cat-amt{font-size:12px;font-weight:600;color:#e5e5ea;}
.groups-card{background:#111;border-radius:14px;padding:20px;}
.groups-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #1a1a1a;}
.groups-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;}
.groups-ctrl{display:flex;align-items:center;gap:10px;}
.total-count span{color:#ff6a00;font-weight:600;font-size:10px;}
.toggle-all-btn{font-size:10px;font-weight:600;color:#ff6a00;background:none;border:none;cursor:pointer;padding:0;}
.toggle-all-btn:hover{color:#ff8c00;}
.group{border:1px solid #1a1a1a;border-radius:10px;margin-bottom:8px;overflow:hidden;}.group:last-child{margin-bottom:0;}.group.open{border-color:#2a2a2a;}
.group-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s;}.group-hdr:hover{background:#161616;}
.div-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.group-name{font-size:12px;font-weight:600;color:#e5e5ea;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}.group-count{font-size:10px;color:#777;white-space:nowrap;}.group-total{font-size:12px;font-weight:700;white-space:nowrap;}
.chevron{font-size:11px;color:#666;transition:transform .2s;display:inline-block;line-height:1;flex-shrink:0;}.chevron.open{transform:rotate(90deg);}
.group-body{display:none;border-top:1px solid #1a1a1a;}.group-body.open{display:block;}
.scroll-inner{overflow-y:auto;max-height:260px;}.scroll-inner::-webkit-scrollbar{width:3px;}.scroll-inner::-webkit-scrollbar-track{background:transparent;}.scroll-inner::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}
.job-row{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid #1a1a1a;}.job-row:last-child{border-bottom:none;}
.div-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}.job-info{flex:1;min-width:0;}
.job-addr{font-size:11px;font-weight:500;color:#e5e5ea;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-meta-txt{font-size:9px;color:#777;}.job-amt{font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0;padding-left:8px;}
.group-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid #1a1a1a;background:#0d0d0d;}
.gf-label{font-size:9px;color:#666;letter-spacing:0.5px;text-transform:uppercase;}.gf-total{font-size:11px;font-weight:700;}
.ts-banner{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;padding:8px 16px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;font-size:10px;color:#666;}
.ts-banner .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;}.ts-banner strong{color:#666;}
.toast{position:fixed;bottom:24px;right:24px;background:#111;border:1px solid #222;border-radius:12px;padding:14px 18px;font-size:12px;color:#f5f5f7;z-index:2000;display:flex;align-items:center;gap:10px;transition:all .3s;transform:translateY(80px);opacity:0;}
.toast.show{transform:translateY(0);opacity:1;}.toast.success{border-color:#4ade80;}.toast.error{border-color:#f87171;}.toast-icon{font-size:16px;}
.est-row{display:flex;align-items:center;gap:10px;padding:18px 0;border-bottom:1px solid #1a1a1a;}.est-row:last-child{border-bottom:none;}
.col-bar{width:140px;flex-shrink:0;}
.prog-track{height:6px;background:#1c1c1c;border-radius:10px;overflow:visible;position:relative;}
.prog-fill{height:100%;border-radius:10px;width:0;transition:width 1.2s cubic-bezier(0.16,1,0.3,1);position:relative;}
.prog-pct{font-size:9px;font-weight:700;margin-top:3px;}
.col-amount{text-align:right;flex-shrink:0;}
.col-medal{width:26px;text-align:center;flex-shrink:0;}

    document.getElementById('inv-count').innerHTML='';
  } else {
    var byDiv={},byEst={},cntEst={};
    jobs.forEach(function(j){byDiv[j.div]=(byDiv[j.div]||0)+j.amt;byEst[j.est]=(byEst[j.est]||0)+j.amt;cntEst[j.est]=(cntEst[j.est]||0)+1;});
    var sDiv=Object.entries(byDiv).sort(function(a,b){return b[1]-a[1];});
    var sEst=Object.entries(byEst).sort(function(a,b){return b[1]-a[1];});
    var uniqJobs={};jobs.forEach(function(j){if(j.job)uniqJobs[j.job]=1;});var jobCount=Object.keys(uniqJobs).length;if(jobCount===0){document.getElementById('k-avg').textContent='—';document.getElementById('k-avg-note').textContent='No job numbers in data';}else{document.getElementById('k-avg').textContent=fmtK(totalInv/jobCount);document.getElementById('k-avg-note').textContent='Per job · '+jobCount.toLocaleString()+' jobs';}
    if(sDiv.length){document.getElementById('k-topdiv').textContent=sDiv[0][0];document.getElementById('k-topdiv-sub').textContent=fmt$(sDiv[0][1]);}
    if(sEst.length){document.getElementById('k-topest').textContent=sEst[0][0];document.getElementById('k-topest-sub').textContent=fmt$(sEst[0][1]);}
    var el=document.getElementById('est-list');el.innerHTML='';
    sEst.forEach(function(e,i){
      var medals=['🥇','🥈','🥉'];
      var cnt=cntEst[e[0]]||0,sharePct=Math.round(e[1]/totalInv*100);
      var monthlyGoal=EST_GOALS[e[0]]||null;
      var scaledGoal=getGoalForMode(monthlyGoal,MODE);
      var exceeded=scaledGoal&&e[1]>=scaledGoal;
      var avGrad=exceeded?'linear-gradient(135deg,#4ade80,#22c55e)':'linear-gradient(135deg,#ff6a00,#ff9a00)';
      var amtCol=exceeded?'#4ade80':'#ff6a00';
      var d=document.createElement('div');d.className='est-row';
      var barHtml='';
      if(scaledGoal){var pctOfGoal=e[1]/scaledGoal;barHtml=drawBar(pctOfGoal,exceeded,'e'+i);}
      var amtHtml='<div class="col-amount"><div style="font-size:13px;font-weight:600;color:'+amtCol+';">'+fmtK(e[1])+'</div>'+(scaledGoal?'<div style="font-size:9px;color:#777;">Goal '+fmtK(scaledGoal)+'</div>':'')+'</div>';
      var medalHtml='<div class="col-medal">'+(i<3?'<span style="font-size:22px;line-height:1;">'+medals[i]+'</span>':'')+'</div>';
      d.innerHTML='<div class="av" style="background:'+avGrad+';">'+inits(e[0])+'</div><div style="flex:1;min-width:0"><div class="est-name">'+e[0]+'</div><div class="est-sub">'+cnt+' job'+(cnt!==1?'s':'')+'&nbsp;·&nbsp;'+sharePct+'% of total</div></div><div class="est-right">'+barHtml+amtHtml+medalHtml+'</div>';
      el.appendChild(d);
    });
    var db=document.getElementById('div-bars');db.innerHTML='';
    var divMedals=['🥇','🥈','🥉'];
    sDiv.forEach(function(d,i){
      var col=DCOL[d[0]]||'#ff6a00';
      var monthlyGoal=DIV_GOALS[d[0]]||null;
      var scaledGoal=getGoalForMode(monthlyGoal,MODE);
      var exceeded=scaledGoal&&d[1]>=scaledGoal;
      var sharePctDiv=Math.round(d[1]/totalInv*100);
      var amtCol=exceeded?'#4ade80':col;
      var r=document.createElement('div');r.className='est-row';
      var barHtml='';
      if(scaledGoal){var pctOfGoal=d[1]/scaledGoal;barHtml=drawBar(pctOfGoal,exceeded,'d'+i);}
      var amtHtml='<div class="col-amount"><div style="font-size:13px;font-weight:600;color:'+amtCol+';">'+fmtK(d[1])+'</div>'+(scaledGoal?'<div style="font-size:9px;color:#777;">Goal '+fmtK(scaledGoal)+'</div>':'')+'</div>';
      var medalHtml='<div class="col-medal">'+(i<3?'<span style="font-size:22px;line-height:1;">'+divMedals[i]+'</span>':'')+'</div>';
      var divCode=DIV_CODE[d[0]]||d[0].charAt(0);var divLabel=divCode.length>3?divCode.slice(0,3)+'<br>'+divCode.slice(3):divCode;var divFs=divCode.length>3?'7px':'8px';
      r.innerHTML='<div class="av" style="background:'+col+';font-size:'+divFs+';line-height:1.3;text-align:center;">'+divLabel+'</div>'
        +'<div style="flex:1;min-width:0"><div class="est-name">'+d[0]+'</div><div class="est-sub">'+sharePctDiv+'% of total</div></div>'
        +'<div class="est-right">'+barHtml+amtHtml+medalHtml+'</div>';
      db.appendChild(r);
    });
    buildGroups(jobs,'inv-groups','inv-toggle-btn','inv-count','GC_INV',DCOL);
  }
  if(!payments.length){
    document.getElementById('pay-groups').innerHTML='<div class="no-data">No payments for this period</div>';
    document.getElementById('pay-count').innerHTML='';
  } else {
    buildGroups(payments,'pay-groups','pay-toggle-btn','pay-count','GC_PAY',DCOL);
  }
}
function setMode(m){
  MODE=m;
  ['year','month','week','day'].forEach(function(k){document.getElementById('tog-'+k).classList.toggle('active',k===m);});
  var dw=document.getElementById('date-wrap');
  dw.style.display=m==='year'?'none':'flex';
  if(m!=='year')document.getElementById('date-lbl').textContent=m==='day'?'Date':m==='week'?'Week of':'Month of';
  applyFilter();
}
function applyFilter(){
  var jobs=filterData(ALL_JOBS,MODE),pays=filterData(ALL_PAYS,MODE),picked=getPickedDate();
  document.getElementById('hdr-period').textContent=formatPeriodLabel(picked,MODE);
  renderAll(jobs,pays,DCOL,CCOL,MODE);
}
function parseXLS(file,isPayments){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws,{header:1}),h=rows[0];
      if(isPayments){
        var dI=h.indexOf('Division'),eI=h.indexOf('Estimator'),cI=h.indexOf('Loss Category'),aI=h.indexOf('Payment Amount'),dtI=h.indexOf('Payment Date');
        var items=[];
        for(var i=1;i<rows.length;i++){
          var row=rows[i],amt=parseFloat(row[aI]);
          if(!isNaN(amt)&&row[dI]&&amt>0){
            var ds=row[dtI]?String(row[dtI]).trim():'';
            if(row[dtI]&&row[dtI].getMonth){var d=row[dtI];ds=(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
            items.push({div:String(row[dI]||'').trim(),est:String(row[eI]||'').trim().replace(/\s+/g,' '),cat:String(row[cI]||'').trim(),amt:Math.round(amt*100)/100,addr:[(row[18]||''),(row[19]||'')].filter(Boolean).join(', '),dateStr:ds,dateObj:parseJobDate(ds)});
          }
        }
        if(items.length){ALL_PAYS=items;showToast('\u2713 '+items.length+' payments loaded','success');applyFilter();}
      } else {
        var dI=h.indexOf('Division'),eI=h.indexOf('Estimator'),cI=h.indexOf('Loss Category'),aI=h.indexOf('Invoiced Subtotal');
        var items=[];
        for(var i=1;i<rows.length;i++){
          var row=rows[i],amt=parseFloat(row[aI]);
          if(!isNaN(amt)&&row[dI]&&amt!==0){
            var ds=row[5]?String(row[5]).trim():'';
            if(row[5]&&row[5].getMonth){var d=row[5];ds=(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
            items.push({job:String(row[4]||'').trim(),div:String(row[dI]||'').trim(),est:String(row[eI]||'').trim().replace(/\s+/g,' '),cat:String(row[cI]||'').trim(),amt:Math.round(amt*100)/100,addr:[(row[17]||''),(row[18]||'')].filter(Boolean).join(', '),dateStr:ds,dateObj:parseJobDate(ds)});
          }
        }
        if(items.length){
          ALL_JOBS=items;
          var dates=items.map(function(j){return j.dateObj;}).filter(Boolean);
          if(dates.length){var latest=dates.reduce(function(a,b){return a>b?a:b;});document.getElementById('date-picker').value=latest.getFullYear()+'-'+String(latest.getMonth()+1).padStart(2,'0')+'-'+String(latest.getDate()).padStart(2,'0');}
          showToast('\u2713 '+items.length+' invoices loaded','success');
          applyFilter();
        }
      }
    }catch(err){alert('Could not read file: '+err.message);}
  };
  r.readAsArrayBuffer(file);
}
function showToast(msg,type){
  var t=document.getElementById('toast');t.className='toast '+(type||'');
  document.getElementById('toast-msg').textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},4000);
}(function(){var dates=ALL_JOBS.map(function(j){return j.dateObj;}).filter(Boolean);if(dates.length){var latest=dates.reduce(function(a,b){return a>b?a:b;});document.getElementById('date-picker').value=latest.getFullYear()+'-'+String(latest.getMonth()+1).padStart(2,'0')+'-'+String(latest.getDate()).padStart(2,'0');}applyFilter();})();</script></body></html>
