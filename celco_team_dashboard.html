<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>CELCO · Scoreboard</title><style>*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;padding:28px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #1c1c1c;}
.wm-tag{font-size:9px;font-weight:600;letter-spacing:2px;color:#444;text-transform:uppercase;margin-top:3px;}
.hdr-right{text-align:right;}.hdr-date{font-size:13px;font-weight:500;color:#ff6a00;}.hdr-sub{font-size:11px;color:#555;margin-top:3px;}
.mgr-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:14px 16px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;flex-wrap:wrap;}
.mgr-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#333;margin-right:4px;}
.mgr-sep{width:1px;height:24px;background:#1e1e1e;margin:0 4px;}
.drop-trigger{display:flex;align-items:center;gap:8px;padding:7px 14px;border:1px dashed #2a2a2a;border-radius:8px;cursor:pointer;transition:all .2s;background:transparent;}
.drop-trigger:hover{border-color:#ff6a00;background:rgba(255,106,0,0.05);}.drop-trigger input{display:none;}
.drop-trigger-icon{font-size:14px;}.drop-trigger-text{font-size:11px;font-weight:500;color:#555;}
.drop-trigger:hover .drop-trigger-text{color:#ff6a00;}
.pub-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;background:#ff6a00;border:none;border-radius:8px;color:#000;font-size:11px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all .18s;margin-left:auto;}
.pub-btn:hover{background:#ff8c00;transform:translateY(-1px);}.pub-btn svg{width:13px;height:13px;flex-shrink:0;}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toggle-group{display:flex;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:4px;gap:3px;}
.tog{padding:7px 18px;border-radius:7px;font-size:11px;font-weight:600;letter-spacing:0.5px;cursor:pointer;border:none;background:transparent;color:#888;transition:all .18s;}
.tog.active{background:#ff6a00;color:#000;}.tog:hover:not(.active){background:#2a2a2a;color:#f5f5f7;}
.date-wrap{display:flex;align-items:center;gap:8px;}
.date-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#555;}
.date-inp{background:#1a1a1a;border:1px solid #333;color:#f5f5f7;border-radius:8px;padding:7px 12px;font-size:11px;font-family:inherit;outline:none;cursor:pointer;}
.date-inp:focus{border-color:#ff6a00;}.filter-info{font-size:11px;color:#555;margin-left:auto;}.filter-info span{color:#ff6a00;font-weight:600;}
.no-data{text-align:center;padding:40px 20px;color:#444;font-size:13px;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:#111;border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;transition:transform .18s;}
.kpi:hover{transform:translateY(-2px);}.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.kpi-lbl{font-size:9px;font-weight:600;color:#555;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.kpi-val{font-size:clamp(14px,2.8vw,24px);font-weight:700;letter-spacing:-0.5px;line-height:1;color:#f5f5f7;word-break:break-all;}
.kpi-val.orange{color:#ff6a00;}.kpi-val.green{color:#4ade80;}.kpi-note{font-size:10px;color:#444;margin-top:6px;}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}.kpi-val{font-size:clamp(14px,5vw,22px);}.mgr-bar{gap:6px;}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{background:#111;border-radius:14px;padding:20px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #1a1a1a;}
.est-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1a1a1a;}.est-row:last-child{border-bottom:none;}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ff6a00,#ff9a00);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0;}
.est-name{font-size:12px;font-weight:500;color:#e5e5ea;}.est-sub{font-size:9px;color:#555;margin-top:2px;}
.est-right{display:flex;align-items:center;margin-left:auto;gap:8px;}
.est-amt{font-size:13px;font-weight:600;color:#ff6a00;font-variant-numeric:tabular-nums;}
.rb{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;}
.r1{background:rgba(255,106,0,0.15);color:#ff6a00;}.r2{background:rgba(255,106,0,0.08);color:#cc5200;}.r3{background:#1a1a1a;color:#555;}
.bar-row{margin-bottom:14px;}.bar-row:last-child{margin-bottom:0;}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.bar-name{font-size:12px;font-weight:500;color:#e5e5ea;}.bar-amt{font-size:10px;font-weight:600;}
.bar-track{height:5px;background:#1c1c1c;border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1);width:0;}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a;}.cat-row:last-child{border-bottom:none;}
.cat-left{display:flex;align-items:center;gap:8px;}.cat-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cat-name{font-size:12px;font-weight:500;color:#e5e5ea;}.cat-sub{font-size:9px;color:#555;margin-top:1px;}.cat-amt{font-size:12px;font-weight:600;color:#e5e5ea;}
.groups-card{background:#111;border-radius:14px;padding:20px;}
.groups-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #1a1a1a;}
.groups-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;}
.groups-ctrl{display:flex;align-items:center;gap:10px;}
.total-count span{color:#ff6a00;font-weight:600;font-size:10px;}
.toggle-all-btn{font-size:10px;font-weight:600;color:#ff6a00;background:none;border:none;cursor:pointer;padding:0;}
.toggle-all-btn:hover{color:#ff8c00;}
.group{border:1px solid #1a1a1a;border-radius:10px;margin-bottom:8px;overflow:hidden;}.group:last-child{margin-bottom:0;}.group.open{border-color:#2a2a2a;}
.group-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s;}.group-hdr:hover{background:#161616;}
.div-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.group-name{font-size:12px;font-weight:600;color:#e5e5ea;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}.group-count{font-size:10px;color:#555;white-space:nowrap;}.group-total{font-size:12px;font-weight:700;white-space:nowrap;}
.chevron{font-size:11px;color:#444;transition:transform .2s;display:inline-block;line-height:1;flex-shrink:0;}.chevron.open{transform:rotate(90deg);}
.group-body{display:none;border-top:1px solid #1a1a1a;}.group-body.open{display:block;}
.scroll-inner{overflow-y:auto;max-height:260px;}.scroll-inner::-webkit-scrollbar{width:3px;}.scroll-inner::-webkit-scrollbar-track{background:transparent;}.scroll-inner::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}
.job-row{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid #1a1a1a;}.job-row:last-child{border-bottom:none;}
.div-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}.job-info{flex:1;min-width:0;}
.job-addr{font-size:11px;font-weight:500;color:#e5e5ea;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-meta-txt{font-size:9px;color:#555;}.job-amt{font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0;padding-left:8px;}
.group-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid #1a1a1a;background:#0d0d0d;}
.gf-label{font-size:9px;color:#444;letter-spacing:0.5px;text-transform:uppercase;}.gf-total{font-size:11px;font-weight:700;}
.ts-banner{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;padding:8px 16px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;font-size:10px;color:#444;}
.ts-banner .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;}.ts-banner strong{color:#666;}
.toast{position:fixed;bottom:24px;right:24px;background:#111;border:1px solid #222;border-radius:12px;padding:14px 18px;font-size:12px;color:#f5f5f7;z-index:2000;display:flex;align-items:center;gap:10px;transition:all .3s;transform:translateY(80px);opacity:0;}
.toast.show{transform:translateY(0);opacity:1;}.toast.success{border-color:#4ade80;}.toast.error{border-color:#f87171;}.toast-icon{font-size:16px;}</style></head><body><div class="hdr"><div><img src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCACKAIMDASIAAhEBAxEB/8QAHAAAAgIDAQEAAAAAAAAAAAAAAAcGCAIEBQMB/8QATxAAAQMDAQYCBgUGCAwHAAAAAQIDBAAFEQYHEiExQVETYQgUInGBkRUyQmKCFiNykqHBMzRDVmNzorEXGCU1RFJ0k5SVo7OywtHT4ePw/8QAGwEAAgIDAQAAAAAAAAAAAAAAAAYEBQIDBwH/xAA0EQABAgQCCAUDBAMBAAAAAAABAgMABAURITEGEkFRYXGx8BQigZHBE6HRFSNS8TJC4fL/2gAMAwEAAhEDEQA/AKZUUUUQQUUVaDYts70O5o6BqhmAb1NfY3yJhCktujgpCUfVGFAgFQJ65qrqtVaprQccBNzYW389kWFOpzk+4W0EC2OO6EZorZ1q3VykrtNrcTFJ4y5H5tkfiP1vckE1htO0gdE6gasrlwRNf9VQ8+tCN1KFqKvZGTkgAA5OOfKpfrrbdq66Ldt9raTp6Mglsts8XxjhgrIG7+EJIqMaZ2e631gHLhDtkl1pYLipcpW4lw4zwUrisnyz51oZmJtKvrzqktt/xvf3Vl7RudYllD6MolS177dB+YhtWf27aN0pa9lVxuVr0/bocptTBS80yErSFOoBwfMGqwqSpKyhQKVA4IIwQat3t5Pi7C7ovu1FV/1mqr9IHVonZLVUQCvHHPFOcTaK2hcrNawuQnD2VFQ6KK3LLb5F2vEO1xQC/LfQw3nlvKUAM/OmpSgkFRyELqUlRsI6+itE6l1i+tuxW5T7bRw68pQQ235FR4Z8hk+VSG9bF9oNtZLws6ZraRkmK8lah+HO8fgDVg9S3SzbItmbKYcZLgYCY8Vr6pkPEElSiO+FKJ+A6Ujo23zXjU1T7qra+0TnwFxsIA7AghXzJpQlqrVaipT0ohP0wbDWvc9+3OGZ+nU6SCWpla function getPickedDate(){var v=document.getElementById('date-picker').value;if(!v)return null;var p=v.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function isSameDay(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isSameWeek(a,b){if(!a||!b)return false;function getMon(d){var dd=new Date(d);dd.setHours(0,0,0,0);var dy=dd.getDay();dd.setDate(dd.getDate()-(dy===0?6:dy-1));return dd;}return getMon(a).getTime()===getMon(b).getTime();}
function isSameMonth(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth();}
function formatPeriodLabel(picked,mode){
  if(mode==='year')return'2026 \u2014 Full Year';
  if(!picked)return'All Data';
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(mode==='day')return M[picked.getMonth()]+' '+picked.getDate()+', '+picked.getFullYear();
  if(mode==='week'){var mon=new Date(picked);mon.setHours(0,0,0,0);var dy=mon.getDay();mon.setDate(mon.getDate()-(dy===0?6:dy-1));var sun=new Date(mon);sun.setDate(mon.getDate()+6);return'Week of '+M[mon.getMonth()]+' '+mon.getDate()+' \u2013 '+M[sun.getMonth()]+' '+sun.getDate();}
  return M[picked.getMonth()]+' '+picked.getFullYear();
}
function filterData(arr,mode){
  if(mode==='year')return arr;
  var picked=getPickedDate();if(!picked)return arr;
  return arr.filter(function(j){var jd=j.dateObj;if(!jd)return false;if(mode==='day')return isSameDay(jd,picked);if(mode==='week')return isSameWeek(jd,picked);return isSameMonth(jd,picked);});
}
function buildGroups(items,containerId,toggleBtnId,countId,gcKey,DCOL){
  var byDiv={};
  items.forEach(function(j){if(!byDiv[j.div])byDiv[j.div]={items:[],total:0};byDiv[j.div].items.push(j);byDiv[j.div].total+=j.amt;});
  var sorted=Object.entries(byDiv).sort(function(a,b){return b[1].total-a[1].total;});
  window[gcKey]=sorted.length;
  document.getElementById(countId).innerHTML='<span>'+items.length+'</span>';
  var c=document.getElementById(containerId);c.innerHTML='';
  sorted.forEach(function(entry,gi){
    var dn=entry[0],data=entry[1],col=DCOL[dn]||'#888';
    var g=document.createElement('div');g.className='group';g.id=gcKey+'-grp-'+gi;
    var hdr=document.createElement('div');hdr.className='group-hdr';
    hdr.onclick=(function(i,k){return function(){toggleGroup(i,k,toggleBtnId);};})(gi,gcKey);
    hdr.innerHTML='<div class="div-swatch" style="background:'+col+'"></div><div class="group-name">'+dn+'</div><div class="group-meta"><div class="group-count">'+data.items.length+' item'+(data.items.length!==1?'s':'')+'</div><div class="group-total" style="color:'+col+'">'+fmtK(data.total)+'</div><span class="chevron" id="'+gcKey+'-chev-'+gi+'">&#9656;</span></div>';
    var body=document.createElement('div');body.className='group-body';body.id=gcKey+'-gbody-'+gi;
    var inner=document.createElement('div');inner.className='scroll-inner';
    data.items.slice().sort(function(a,b){return b.amt-a.amt;}).forEach(function(j){
      var row=document.createElement('div');row.className='job-row';
      row.innerHTML='<div class="div-dot" style="background:'+col+'"></div><div class="job-info"><div class="job-addr">'+j.addr+'</div><div class="job-meta-txt">'+j.est+' &middot; '+j.dateStr+'</div></div><div class="job-amt" style="color:'+col+'">'+fmt$(j.amt)+'</div>';
      inner.appendChild(row);
    });
    body.appendChild(inner);
    var footer=document.createElement('div');footer.className='group-footer';
    footer.innerHTML='<div class="gf-label">Division total</div><div class="gf-total" style="color:'+col+'">'+fmt$(data.total)+'</div>';
    body.appendChild(footer);g.appendChild(hdr);g.appendChild(body);c.appendChild(g);
  });
  document.getElementById(toggleBtnId).textContent='Expand all';
}
function toggleGroup(gi,gcKey,toggleBtnId){
  var body=document.getElementById(gcKey+'-gbody-'+gi),chev=document.getElementById(gcKey+'-chev-'+gi),grp=document.getElementById(gcKey+'-grp-'+gi);
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);chev.classList.toggle('open',!open);grp.classList.toggle('open',!open);
  var n=window[gcKey]||0,cnt=0;
  for(var i=0;i<n;i++){var b=document.getElementById(gcKey+'-gbody-'+i);if(b&&b.classList.contains('open'))cnt++;}
  document.getElementById(toggleBtnId).textContent=(cnt===n)?'Collapse all':'Expand all';
}
function toggleAll(gcKey,toggleBtnId){
  var n=window[gcKey]||0,cnt=0;
  for(var i=0;i<n;i++){var b=document.getElementById(gcKey+'-gbody-'+i);if(b&&b.classList.contains('open'))cnt++;}
  var open=cnt<n;
  for(var i=0;i<n;i++){
    var body=document.getElementById(gcKey+'-gbody-'+i),chev=document.getElementById(gcKey+'-chev-'+i),grp=document.getElementById(gcKey+'-grp-'+i);
    if(body)body.classList.toggle('open',open);if(chev)chev.classList.toggle('open',open);if(grp)grp.classList.toggle('open',open);
  }
  document.getElementById(toggleBtnId).textContent=open?'Collapse all':'Expand all';
}
function renderAll(jobs,payments,DCOL,CCOL,mode){
  document.getElementById('hdr-sub').textContent=jobs.length+' invoice'+(jobs.length!==1?'s':'')+', '+payments.length+' payment'+(payments.length!==1?'s':'')+' in period';
  var totalInv=jobs.reduce(function(a,j){return a+j.amt;},0);
  var totalPay=payments.reduce(function(a,p){return a+p.amt;},0);
  document.getElementById('k-total').textContent=fmtK(totalInv);
  document.getElementById('k-note').textContent=jobs.length+' invoices';
  document.getElementById('k-collected').textContent=fmtK(totalPay);
  document.getElementById('k-collected-note').textContent=payments.length+' payments';
  if(!jobs.length){
    ['est-list','div-bars','inv-groups'].forEach(function(id){document.getElementById(id).innerHTML='<div class="no-data">No invoices for this period</div>';});
    ['k-avg','k-topdiv','k-topest'].forEach(function(id){document.getElementById(id).textContent='--';});
    ['k-topdiv-sub','k-topest-sub'].forEach(function(id){document.getElementById(id).textContent='';});
    document.getElementById('inv-count').innerHTML='';
  } else {
    var byDiv={},byEst={},cntEst={};
    jobs.forEach(function(j){byDiv[j.div]=(byDiv[j.div]||0)+j.amt;byEst[j.est]=(byEst[j.est]||0)+j.amt;cntEst[j.est]=(cntEst[j.est]||0)+1;});
    var sDiv=Object.entries(byDiv).sort(function(a,b){return b[1]-a[1];});
    var sEst=Object.entries(byEst).sort(function(a,b){return b[1]-a[1];});
    document.getElementById('k-avg').textContent=fmtK(totalInv/jobs.length);
    if(sDiv.length){document.getElementById('k-topdiv').textContent=sDiv[0][0];document.getElementById('k-topdiv-sub').textContent=fmt$(sDiv[0][1]);}
    if(sEst.length){document.getElementById('k-topest').textContent=sEst[0][0];document.getElementById('k-topest-sub').textContent=fmt$(sEst[0][1]);}
    var el=document.getElementById('est-list');el.innerHTML='';
    sEst.forEach(function(e,i){
      var medals=['🥇','🥈','🥉'];
      var badge=i<3?'<span style="font-size:16px;line-height:1;">'+medals[i]+'</span>':'<div class="rb r3">#'+(i+1)+'</div>';
      var cnt=cntEst[e[0]]||0,pct=Math.round(e[1]/totalInv*100);
      var d=document.createElement('div');d.className='est-row';
      d.innerHTML='<div class="av">'+inits(e[0])+'</div><div style="flex:1;min-width:0"><div class="est-name">'+e[0]+'</div><div class="est-sub">'+cnt+' job'+(cnt!==1?'s':'')+'&nbsp;&middot;&nbsp;'+pct+'%</div></div><div class="est-right"><div class="est-amt">'+fmtK(e[1])+'</div>'+badge+'</div>';
      el.appendChild(d);
    });
    var db=document.getElementById('div-bars');db.innerHTML='';
    sDiv.forEach(function(d,i){
      var pct=Math.round(d[1]/sDiv[0][1]*100),col=DCOL[d[0]]||'#ff6a00';
      var r=document.createElement('div');r.className='bar-row';
      r.innerHTML='<div class="bar-top"><span class="bar-name">'+d[0]+'</span><span class="bar-amt" style="color:'+col+'">'+fmtK(d[1])+'</span></div><div class="bar-track"><div class="bar-fill" id="bf'+i+'" style="background:'+col+'"></div></div>';
      db.appendChild(r);
      setTimeout(function(idx,p){return function(){var f=document.getElementById('bf'+idx);if(f)f.style.width=p+'%';};}(i,pct),100+i*60);
    });
    buildGroups(jobs,'inv-groups','inv-toggle-btn','inv-count','GC_INV',DCOL);
  }
  if(!payments.length){
    document.getElementById('pay-groups').innerHTML='<div class="no-data">No payments for this period</div>';
    document.getElementById('pay-count').innerHTML='';
  } else {
    buildGroups(payments,'pay-groups','pay-toggle-btn','pay-count','GC_PAY',DCOL);
  }
}
function setMode(m){
  MODE=m;
  ['year','month','week','day'].forEach(function(k){document.getElementById('tog-'+k).classList.toggle('active',k===m);});
  var dw=document.getElementById('date-wrap');
  dw.style.display=m==='year'?'none':'flex';
  if(m!=='year')document.getElementById('date-lbl').textContent=m==='day'?'Date':m==='week'?'Week of':'Month of';
  applyFilter();
}
function applyFilter(){
  var jobs=filterData(ALL_JOBS,MODE),pays=filterData(ALL_PAYS,MODE),picked=getPickedDate();
  document.getElementById('hdr-period').textContent=formatPeriodLabel(picked,MODE);
  document.getElementById('filter-info').innerHTML='<span>'+jobs.length+'</span> inv &nbsp;&middot;&nbsp; <span>'+pays.length+'</span> pay';
  renderAll(jobs,pays,DCOL,CCOL,MODE);
}
function parseXLS(file,isPayments){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws,{header:1}),h=rows[0];
      if(isPayments){
        var dI=h.indexOf('Division'),eI=h.indexOf('Estimator'),cI=h.indexOf('Loss Category'),aI=h.indexOf('Payment Amount'),dtI=h.indexOf('Payment Date');
        var items=[];
        for(var i=1;i<rows.length;i++){
          var row=rows[i],amt=parseFloat(row[aI]);
          if(!isNaN(amt)&&row[dI]&&amt>0){
            var ds=row[dtI]?String(row[dtI]).trim():'';
            if(row[dtI]&&row[dtI].getMonth){var d=row[dtI];ds=(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
            items.push({div:String(row[dI]||'').trim(),est:String(row[eI]||'').trim().replace(/\s+/g,' '),cat:String(row[cI]||'').trim(),amt:Math.round(amt*100)/100,addr:[(row[18]||''),(row[19]||'')].filter(Boolean).join(', '),dateStr:ds,dateObj:parseJobDate(ds)});
          }
        }
        if(items.length){ALL_PAYS=items;showToast('\u2713 '+items.length+' payments loaded','success');applyFilter();}
      } else {
        var dI=h.indexOf('Division'),eI=h.indexOf('Estimator'),cI=h.indexOf('Loss Category'),aI=h.indexOf('Invoiced Subtotal');
        var items=[];
        for(var i=1;i<rows.length;i++){
          var row=rows[i],amt=parseFloat(row[aI]);
          if(!isNaN(amt)&&row[dI]&&amt>0){
            var ds=row[5]?String(row[5]).trim():'';
            if(row[5]&&row[5].getMonth){var d=row[5];ds=(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
            items.push({div:String(row[dI]||'').trim(),est:String(row[eI]||'').trim().replace(/\s+/g,' '),cat:String(row[cI]||'').trim(),amt:Math.round(amt*100)/100,addr:[(row[17]||''),(row[18]||'')].filter(Boolean).join(', '),dateStr:ds,dateObj:parseJobDate(ds)});
          }
        }
        if(items.length){
          ALL_JOBS=items;
          var dates=items.map(function(j){return j.dateObj;}).filter(Boolean);
          if(dates.length){var latest=dates.reduce(function(a,b){return a>b?a:b;});document.getElementById('date-picker').value=latest.getFullYear()+'-'+String(latest.getMonth()+1).padStart(2,'0')+'-'+String(latest.getDate()).padStart(2,'0');}
          showToast('\u2713 '+items.length+' invoices loaded','success');
          applyFilter();
        }
      }
    }catch(err){alert('Could not read file: '+err.message);}
  };
  r.readAsArrayBuffer(file);
}
function showToast(msg,type){
  var t=document.getElementById('toast');t.className='toast '+(type||'');
  document.getElementById('toast-msg').textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},4000);
}(function(){var dates=ALL_JOBS.map(function(j){return j.dateObj;}).filter(Boolean);if(dates.length){var latest=dates.reduce(function(a,b){return a>b?a:b;});document.getElementById('date-picker').value=latest.getFullYear()+'-'+String(latest.getMonth()+1).padStart(2,'0')+'-'+String(latest.getDate()).padStart(2,'0');}applyFilter();})();</script></body></html>
