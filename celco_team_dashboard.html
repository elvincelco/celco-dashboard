<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CELCO · Sales Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;padding:28px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #1c1c1c;}
.wm-tag{font-size:9px;font-weight:600;letter-spacing:2px;color:#444;text-transform:uppercase;margin-top:3px;}
.hdr-right{text-align:right;}
.hdr-date{font-size:13px;font-weight:500;color:#ff6a00;}
.hdr-sub{font-size:11px;color:#555;margin-top:3px;}
.ts-banner{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;padding:8px 16px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;font-size:10px;color:#444;}
.ts-banner .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;}
.ts-banner strong{color:#666;}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toggle-group{display:flex;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:4px;gap:3px;}
.tog{padding:7px 18px;border-radius:7px;font-size:11px;font-weight:600;letter-spacing:0.5px;cursor:pointer;border:none;background:transparent;color:#888;transition:all .18s;}
.tog.active{background:#ff6a00;color:#000;}
.tog:hover:not(.active){background:#2a2a2a;color:#f5f5f7;}
.date-wrap{display:flex;align-items:center;gap:8px;}
.date-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#555;}
.date-inp{background:#1a1a1a;border:1px solid #333;color:#f5f5f7;border-radius:8px;padding:7px 12px;font-size:11px;font-family:inherit;outline:none;cursor:pointer;}
.date-inp:focus{border-color:#ff6a00;}
.filter-info{font-size:11px;color:#555;margin-left:auto;}
.filter-info span{color:#ff6a00;font-weight:600;}
.no-data{text-align:center;padding:40px 20px;color:#444;font-size:13px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:#111;border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;transition:transform .18s;}
.kpi:hover{transform:translateY(-2px);}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.kpi-lbl{font-size:9px;font-weight:600;color:#555;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.kpi-val{font-size:clamp(16px,3.5vw,26px);font-weight:700;letter-spacing:-0.5px;line-height:1;color:#f5f5f7;word-break:break-all;}
.kpi-val.orange{color:#ff6a00;}
.kpi-note{font-size:10px;color:#444;margin-top:6px;}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}.kpi-val{font-size:clamp(14px,5vw,22px);}.mgr-bar{gap:6px;}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{background:#111;border-radius:14px;padding:20px;}
.card-title{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #1a1a1a;}
.est-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1a1a1a;}
.est-row:last-child{border-bottom:none;}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ff6a00,#ff9a00);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0;}
.est-name{font-size:12px;font-weight:500;color:#e5e5ea;}
.est-sub{font-size:9px;color:#555;margin-top:2px;}
.est-right{display:flex;align-items:center;margin-left:auto;gap:8px;}
.est-amt{font-size:13px;font-weight:600;color:#ff6a00;font-variant-numeric:tabular-nums;}
.rb{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;}
.r1{background:rgba(255,106,0,0.15);color:#ff6a00;}
.r2{background:rgba(255,106,0,0.08);color:#cc5200;}
.r3{background:#1a1a1a;color:#555;}
.bar-row{margin-bottom:14px;}
.bar-row:last-child{margin-bottom:0;}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.bar-name{font-size:12px;font-weight:500;color:#e5e5ea;}
.bar-amt{font-size:10px;font-weight:600;}
.bar-track{height:5px;background:#1c1c1c;border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1);width:0;}
.job-row{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #1a1a1a;}
.job-row:last-child{border-bottom:none;}
.div-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.job-addr{font-size:11px;font-weight:500;color:#e5e5ea;margin-bottom:2px;}
.job-meta{font-size:9px;color:#555;}
.job-amt{font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0;}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a;}
.cat-row:last-child{border-bottom:none;}
.cat-left{display:flex;align-items:center;gap:8px;}
.cat-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cat-name{font-size:12px;font-weight:500;color:#e5e5ea;}
.cat-sub{font-size:9px;color:#555;margin-top:1px;}
.cat-amt{font-size:12px;font-weight:600;color:#e5e5ea;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
