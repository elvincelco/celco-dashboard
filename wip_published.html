<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="1800">
<title>CELCO · WIP Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;padding:clamp(14px,3vw,28px);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #1c1c1c;position:relative;gap:12px;}
.hdr-logo{height:clamp(36px,5vw,52px);width:auto;display:block;}
.wm-tag{font-size:9px;font-weight:600;letter-spacing:2px;color:#666;text-transform:uppercase;margin-top:3px;}
.hdr-center{flex:1;text-align:center;}
.hdr-title{font-size:clamp(13px,2vw,16px);font-weight:600;color:#ff6a00;letter-spacing:0.3px;}
.hdr-sub{font-size:clamp(10px,1.4vw,12px);color:#555;margin-top:4px;}
.updated-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:rgba(74,222,128,0.08);color:#4ade80;border:1px solid rgba(74,222,128,0.2);padding:4px 10px;border-radius:20px;margin-top:6px;}
.updated-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}


/* ── AGE IN WIP (matches PC Hub jl-days pattern) ── */
.jl-days{font-size:clamp(11px,1.4vw,13px);font-weight:700;}
.jl-days.green{color:#4ade80;}
.jl-days.orange{color:#ff6a00;}
.jl-days.yellow{color:#facc15;}
.jl-days.red{color:#f87171;}

/* ── DIVISION SELECTOR ── */
.div-selector-wrap{margin-bottom:16px;}
.div-selector-label{font-size:9px;font-weight:600;letter-spacing:1.5px;color:#444;text-transform:uppercase;margin-bottom:8px;}
.div-scroller{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;}
.div-scroller::-webkit-scrollbar{display:none;}
.div-btn{padding:clamp(8px,1.5vw,11px) clamp(14px,2.5vw,22px);border-radius:10px;font-size:clamp(11px,1.6vw,13px);font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#111;color:#888;transition:all .2s;font-family:inherit;letter-spacing:0.3px;white-space:nowrap;flex-shrink:0;}
.div-btn:hover:not(.active){border-color:#444;color:#ccc;background:#161616;}
.div-btn.active{background:#ff6a00;color:#000;border-color:#ff6a00;}

/* ── KPI SUMMARY ── */
.summary-row{display:grid;grid-template-columns:1fr 180px 1fr;gap:12px;margin-bottom:16px;align-items:start;}
.kpi-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kpi{background:#111;border-radius:14px;padding:clamp(14px,2vw,20px) clamp(12px,1.8vw,18px);position:relative;overflow:hidden;transition:transform .18s;}
.kpi-clickable:hover{transform:translateY(-2px);outline:1px solid #333;}
.kpi-clickable{cursor:pointer;}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.kpi-lbl{font-size:clamp(8px,1.1vw,9px);font-weight:600;color:#777;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.kpi-val{font-size:clamp(18px,3.5vw,32px);font-weight:700;letter-spacing:-0.5px;line-height:1;word-break:break-all;}
.kpi-val.orange{color:#ff6a00;}
.kpi-val.green{color:#4ade80;}
.kpi-val.yellow{color:#facc15;}
.kpi-val.red{color:#f87171;}
.kpi-note{font-size:clamp(9px,1.1vw,11px);color:#666;margin-top:6px;}

/* ── DONUT ── */
.donut-card{background:#111;border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-wrap{position:relative;width:clamp(90px,10vw,120px);height:clamp(90px,10vw,120px);margin:0 auto 10px;}
.donut-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-total{font-size:clamp(18px,2.5vw,26px);font-weight:700;line-height:1;}
.donut-lbl-inner{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.donut-legend{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;width:100%;}
.donut-leg-item{display:flex;align-items:center;gap:5px;font-size:clamp(9px,1.1vw,10px);color:#888;}
.donut-leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.flag-group{display:flex;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:4px;gap:3px;}
.flag-tog{padding:clamp(6px,1vw,8px) clamp(10px,1.5vw,14px);border-radius:7px;font-size:clamp(10px,1.3vw,12px);font-weight:600;cursor:pointer;border:none;background:transparent;color:#888;transition:all .18s;font-family:inherit;white-space:nowrap;}
.flag-tog:hover:not(.active){background:#2a2a2a;color:#f5f5f7;}
.flag-tog.all.active{background:#ff6a00;color:#000;}
.flag-tog.watch.active{background:rgba(250,204,21,0.18);color:#facc15;outline:1px solid rgba(250,204,21,0.4);}
.flag-tog.alert.active{background:rgba(248,113,113,0.18);color:#f87171;outline:1px solid rgba(248,113,113,0.4);}
.search-inp{background:#1a1a1a;border:1px solid #333;color:#f5f5f7;border-radius:8px;padding:7px 12px;font-size:12px;font-family:inherit;outline:none;flex:1;min-width:120px;max-width:240px;}
.search-inp:focus{border-color:#ff6a00;}
.search-inp::placeholder{color:#555;}
.filter-info{font-size:11px;color:#555;margin-left:auto;white-space:nowrap;}
.filter-info span{color:#ff6a00;font-weight:600;}

/* ── FOREMAN SECTIONS ── */
.foreman-section{margin-bottom:10px;border-radius:14px;overflow:hidden;border:1px solid #1a1a1a;}
.foreman-header{background:#111;padding:clamp(12px,1.8vw,16px) clamp(14px,2vw,20px);display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .18s;}
.foreman-header:hover{background:#161616;}
.foreman-initials{width:clamp(34px,4vw,42px);height:clamp(34px,4vw,42px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,1.3vw,13px);font-weight:700;flex-shrink:0;}
.foreman-name-wrap{flex:1;min-width:0;}
.foreman-name{font-size:clamp(13px,1.8vw,16px);font-weight:600;color:#f5f5f7;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.foreman-meta{font-size:clamp(10px,1.2vw,12px);color:#666;margin-top:3px;}
.foreman-bar-wrap{width:clamp(100px,14vw,180px);flex-shrink:0;}
.foreman-bar-track{height:8px;background:#1c1c1c;border-radius:10px;overflow:hidden;}
.foreman-bar-fill{height:100%;border-radius:10px;transition:width 1s cubic-bezier(0.16,1,0.3,1);}
.foreman-bar-pct{font-size:9px;font-weight:700;margin-top:3px;}
.foreman-gp-val{font-size:clamp(18px,2.8vw,26px);font-weight:700;width:clamp(56px,6vw,80px);text-align:right;flex-shrink:0;letter-spacing:-0.5px;}
.chevron{font-size:11px;color:#444;width:18px;text-align:center;flex-shrink:0;transition:transform .2s;display:inline-block;}
.chevron.open{transform:rotate(180deg);}
.foreman-jobs{background:#0a0a0a;display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.foreman-jobs.open{display:block;}

/* ── JOB TABLE ── */
.job-table{width:100%;border-collapse:collapse;font-size:clamp(11px,1.4vw,13px);}
.job-table th{text-align:left;padding:8px 14px;font-size:clamp(8px,1vw,9px);text-transform:uppercase;letter-spacing:1px;color:#444;background:#0d0d0d;border-bottom:1px solid #1a1a1a;white-space:nowrap;}
.job-table td{padding:clamp(8px,1.2vw,12px) 14px;border-bottom:1px solid #111;vertical-align:middle;}
.job-table tr:last-child td{border-bottom:none;}
.job-table tr:hover td{background:rgba(255,106,0,0.03);}
.job-num{font-size:10px;color:#555;font-weight:600;}
.job-name{font-weight:500;max-width:clamp(140px,22vw,300px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e5e5ea;}
/* Constrain the <td> so long job names truncate inside the table */
.col-job-name{max-width:clamp(180px,24vw,340px);overflow:hidden;}
.col-job-name .job-name{display:block;max-width:100%;}
.gp-badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:clamp(11px,1.4vw,13px);font-weight:700;}
.gp-great{background:rgba(74,222,128,0.1);color:#4ade80;}
.gp-ok{background:rgba(255,106,0,0.1);color:#ff6a00;}
.gp-watch{background:rgba(250,204,21,0.1);color:#facc15;}
.gp-alert{background:rgba(248,113,113,0.1);color:#f87171;}
.gp-zero{background:rgba(255,255,255,0.05);color:#555;}
.div-pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;background:rgba(255,106,0,0.1);color:#ff6a00;}
.dollar-val{font-size:clamp(11px,1.4vw,13px);font-weight:600;}
.stripe{width:4px;padding:0!important;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:clamp(16px,4vw,40px) clamp(12px,3vw,20px);overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#111;border-radius:20px;width:100%;max-width:1100px;border:1px solid #222;overflow:hidden;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1c1c1c;}
.modal-title{font-size:clamp(13px,2vw,16px);font-weight:700;color:#f5f5f7;}
.modal-sub{font-size:11px;color:#666;margin-top:3px;}
.modal-close{width:32px;height:32px;border-radius:50%;background:#1a1a1a;border:none;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .15s;}
.modal-close:hover{background:#2a2a2a;color:#f5f5f7;}
.modal-body{padding:14px 22px 22px;overflow-x:auto;}
.modal-job-table{width:100%;border-collapse:collapse;font-size:clamp(11px,1.4vw,13px);}
.modal-job-table th{text-align:left;padding:8px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#444;border-bottom:1px solid #1a1a1a;white-space:nowrap;}
.modal-job-table td{padding:10px;border-bottom:1px solid #111;vertical-align:middle;}
.modal-job-table tr:last-child td{border-bottom:none;}
.modal-job-table tr:hover td{background:rgba(255,106,0,0.03);}
.modal-empty{text-align:center;padding:40px;color:#4ade80;font-size:14px;}

/* ── NO DATA STATE ── */
.no-data{text-align:center;padding:80px 20px;}
.no-data-icon{font-size:56px;margin-bottom:16px;opacity:0.3;}
.no-data-text{font-size:16px;font-weight:600;color:#444;margin-bottom:8px;}
.no-data-sub{font-size:12px;color:#333;}
.no-results{text-align:center;padding:30px;font-size:12px;color:#555;}

/* ── JOB CARDS (mobile-only) ── */
.job-cards{display:none;padding:10px;}
.job-card{background:#0f0f0f;border:1px solid #1a1a1a;border-left:4px solid #333;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.job-card:last-child{margin-bottom:0;}
.jc-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.jc-id{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
.jc-id .job-num{font-size:10px;color:#666;font-weight:600;}
.jc-name{font-size:14px;font-weight:600;color:#f5f5f7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jc-badge{flex-shrink:0;}
.jc-sub{margin-bottom:10px;}
.jc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;padding:10px 0;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;}
.jc-cell{display:flex;flex-direction:column;gap:2px;}
.jc-lbl{font-size:9px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.8px;}
.jc-val{font-size:14px;font-weight:600;color:#e5e5ea;letter-spacing:-0.2px;}
.jc-variance{display:flex;align-items:center;justify-content:space-between;padding-top:10px;}
.jc-var-val{font-size:16px;font-weight:700;letter-spacing:-0.3px;}

/* ── PHONE: swap table for cards, stack layout ── */
@media(max-width:640px){
  .summary-row{grid-template-columns:1fr;}
  .kpi-pair{grid-template-columns:1fr 1fr;}
  
  .foreman-bar-wrap{display:none;}
  .job-table{display:none;}
  .job-cards{display:block;}
  .foreman-jobs{padding:0;}
  .filter-bar{gap:6px;}
  .search-inp{max-width:100%;}
}

/* ── TV: bigger everything ── */
@media(min-width:1600px){
  body{padding:36px 48px;}
  .foreman-name{font-size:18px;}
  .foreman-meta{font-size:13px;}
  .kpi-lbl{font-size:10px;}
  .job-table{font-size:14px;}
  .job-table th{font-size:10px;}
  .div-btn{font-size:14px;padding:12px 24px;}
}

/* ── GP TOGGLE (Push 1.2) ── */
.gear-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;font-size:clamp(16px,2.2vw,20px);cursor:pointer;padding:8px 12px;border-radius:8px;line-height:1;transition:all .15s;font-family:inherit;}
.gear-btn:hover{background:#2a2a2a;border-color:#444;color:#ccc;}
.gear-btn.on{color:#000;background:#ff6a00;border-color:#ff6a00;}
.gp-row{display:none;margin-bottom:16px;}
body.gp-on .gp-row{display:grid;grid-template-columns:1fr 180px 1fr;gap:12px;}
.gp-col{display:none;}
body.gp-on .gp-col{display:table-cell;}
.gp-row .kpi-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

<script>
// ── INJECTED DATA ─────────────────────────────────────────────────────────────
// This block is replaced by the CoWork publisher script on each run.

// ── DIVISION CEILINGS (single source of truth — keep in sync with division_ceilings.csv) ──
// Each subdivision (raw Cotality division string) gets a cost ceiling %.
// Ceiling is the MAX % of sold amount allowed to spend on costs.
// e.g. Structure at 0.55 means costs must stay at or below 55% of sold amount.
const SUBDIV_CEILINGS = {
  'Structure':               0.55,
  'Fire Restoration':        0.55,
  'Consulting':              0.50,
  'Upsales':                 0.45,
  'Water Mitigation':        0.25,
  'Mold Remediation':        0.35,
  'Fire Mitigation':         0.90,  // Pure subcontractor pass-through; CELCO earns 10% override
  'Contents':                0.45,
  'Abatement':               0.60,
  'Cleaning':                0.50,
  'Roof Tarp':               0.40,
  'Temp Services':           0.40,
  'Plumbing':                0.55,
  'Residential Plumbing':    0.55,
  'Electrical':              0.55,
  'Maintenance':             0.70,
  'Maint Work Order':        0.60,
  'Maint Insp PMP':          0.50,
  'Irvine Mold Remediation': 0.25,
  'Irvine Structure':        0.65,
  'Irvine Water Mitigation': 0.25,
  'Irvine Plumbing':         0.65,
  'Medical Facilities WTR':  0.25,
  'Medical Facilities STR':  0.55
};

// Case-insensitive ceiling lookup keyed by lowercased raw division string.
const SUBDIV_CEILINGS_LC = {};
Object.keys(SUBDIV_CEILINGS).forEach(function(k){ SUBDIV_CEILINGS_LC[k.toLowerCase()] = SUBDIV_CEILINGS[k]; });

function ceilingForSubdiv(raw) {
  if (!raw) return null;
  var c = SUBDIV_CEILINGS_LC[String(raw).toLowerCase().trim()];
  return (c === undefined) ? null : c;
}

// ── DIVISION MAPPING (subdivision → parent division) ─────────────────────────
// Returns the canonical Division key for a raw subdivision string from the report.
// Unknown subdivisions return '__UNKNOWN__' (surfaced as warning).
// NOTE: 'upsales' is correctly mapped to STRUCTURE; intentionally NOT in KNOWN_INTERNAL.
const KNOWN_INTERNAL = ['supplement','inventory','labor','vehicles','warehouse','warranty'];

function classifyDivision(raw) {
  const d = (raw || '').toLowerCase().trim();
  if (!d) return null;
  // Medical Facilities — must check before generic water/structure (UCLA-style large medical jobs)
  if (d.startsWith('medical facilities') || d.startsWith('medical ')) return 'MEDICAL';
  // Irvine — must check before generic plumbing/mold/water
  if (d.includes('irv')) return 'IRVINE';
  // Electrical
  if (d.includes('electr')) return 'ELECTRICAL';
  // Maintenance (catches Maintenance, Maint Work Order, Maint Insp PMP)
  if (d.includes('maint')) return 'MAINTENANCE';
  // Plumbing (non-Irvine already excluded above; catches Residential Plumbing)
  if (d.includes('plumb')) return 'PLUMBING';
  // Emergency Services
  if (d === 'water mitigation' || d === 'mold remediation' ||
      d === 'fire mitigation' || d === 'contents' || d === 'abatement' ||
      d === 'cleaning' || d === 'roof tarp' || d === 'temp services') return 'EMERGENCY';
  // Structure (includes Upsales, Fire Restoration, Consulting)
  if (d === 'structure' || d === 'upsales' || d === 'fire restoration' ||
      d === 'consulting') return 'STRUCTURE';
  // Known internal / administrative — silently exclude
  if (KNOWN_INTERNAL.some(k => d.includes(k))) return '__INTERNAL__';
  return '__UNKNOWN__';
}

// ── STATE ────────────────────────────────────────────────────────────────────
let allJobs = [], filteredJobs = [], currentDiv = 'ALL', flagMode = 'all';
const C = {great:'#4ade80', ok:'#ff6a00', watch:'#facc15', alert:'#f87171'};

// ── BUDGET STATUS TIER (per-job) ─────────────────────────────────────────────
// Inputs: cost% and ceiling%. Output: 'over' | 'warning' | 'on' | 'na'
// Warning band = within 10% of the ceiling (e.g. ceiling 50% → warning at 45%+).
// Returns 'na' if job has no estimate (cost% undefined) or no ceiling (unknown subdiv).
function budgetTier(costPct, ceilingPct) {
  if (ceilingPct === null || ceilingPct === undefined) return 'na';
  if (costPct === null || costPct === undefined || !isFinite(costPct)) return 'na';
  if (costPct > ceilingPct) return 'over';
  if (costPct >= ceilingPct * 0.90) return 'warning';
  return 'on';
}

function tierColor(tier) {
  if (tier === 'on') return C.great;
  if (tier === 'warning') return C.watch;
  if (tier === 'over') return C.alert;
  return '#333';
}

// ── DROP / FILE INPUT ────────────────────────────────────────────────────────
// (Only present in the interactive uploader, not the published template)
(function attachDropHandlers(){
  const dropCard = document.getElementById('dropCard');
  if (!dropCard) return; // published view has no drop zone
  dropCard.addEventListener('dragover', e => { e.preventDefault(); dropCard.style.borderColor='#ff6a00'; });
  dropCard.addEventListener('dragleave', () => { dropCard.style.borderColor=''; });
  dropCard.addEventListener('drop', e => { e.preventDefault(); dropCard.style.borderColor=''; handleFile(e.dataTransfer.files[0]); });
  document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
})();

function handleFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array'});
    parseData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''}), file.name);
  };
  r.readAsArrayBuffer(file);
}

function parseData(rows, fname) {
  const unknownDivs = {};
  allJobs = [];

  rows.forEach(r => {
    const jobNum = (r['Job Number'] || '').toString().trim();
    if (!jobNum) return;
    const rawDiv = (r['Division'] || '').toString().trim();
    const divKey = classifyDivision(rawDiv);
    if (!divKey || divKey === '__INTERNAL__') return;
    if (divKey === '__UNKNOWN__') {
      unknownDivs[rawDiv] = (unknownDivs[rawDiv] || 0) + 1;
    }
    const est  = parseFloat(r['Total Estimates']) || 0;
    const cost = parseFloat(r['Total Job Cost'])  || 0;
    const ceiling = ceilingForSubdiv(rawDiv);
    const costPct = est > 0 ? (cost / est) : null;
    const ceilingDollars = (ceiling !== null && est > 0) ? est * ceiling : null;
    const varianceDollars = (ceilingDollars !== null) ? ceilingDollars - cost : null;
    const tier = budgetTier(costPct, ceiling);

    allJobs.push({
      jobNum,
      jobName:   (r['Job Name']    || '').toString().trim(),
      rawDiv,
      divKey:    divKey === '__UNKNOWN__' ? '__UNKNOWN__' : divKey,
      foreman:   (r['Foreperson']  || '').toString().trim().replace(/\s+/g,' '),
      coord:     (r['Coordinator'] || '').toString().trim(),
      estimates: est,
      jobCost:   cost,
      gpDollar:  est - cost,
      gpPct:     parseFloat(r['Working Gross Profit(%)']) || 0,
      ceiling:   ceiling,
      costPct:   costPct,
      ceilingDollars: ceilingDollars,
      varianceDollars: varianceDollars,
      tier:      tier
    });
  });

  // Unrecognized banner
  const unrecKeys = Object.keys(unknownDivs);
  const banner = document.getElementById('unrecBanner');
  if (banner) {
    if (unrecKeys.length) {
      banner.classList.add('show');
      document.getElementById('unrecList').innerHTML = unrecKeys.map(k =>
        `<div>→ <span>${k}</span> &nbsp;(${unknownDivs[k]} job${unknownDivs[k]>1?'s':''})</div>`
      ).join('');
    } else {
      banner.classList.remove('show');
    }
  }

  const statusDot = document.getElementById('statusDot');
  if (statusDot) statusDot.className = 'status-dot green';
  const statusText = document.getElementById('statusText');
  if (statusText) {
    statusText.className  = 'status-text green';
    statusText.textContent = fname + ' · ' + allJobs.length + ' jobs';
  }
  const dropCardEl = document.getElementById('dropCard');
  if (dropCardEl) dropCardEl.classList.add('loaded');
  const hdrSub = document.getElementById('hdrSub');
  if (hdrSub) hdrSub.textContent = allJobs.length + ' jobs loaded · ' + fname;
  // Reset filter state
  flagMode = 'all';
  ['All','Warning','Over'].forEach(k => {
    const el = document.getElementById('flag'+k);
    if (el) el.classList.remove('active');
  });
  const flagAllBtn = document.getElementById('flagAll');
  if (flagAllBtn) flagAllBtn.classList.add('active');
  const searchInpEl = document.getElementById('searchInp');
  if (searchInpEl) searchInpEl.value = '';
  filteredJobs = [...allJobs];
  const filterInfoEl = document.getElementById('filterInfo');
  if (filterInfoEl) filterInfoEl.innerHTML = 'Showing <span>' + filteredJobs.length + '</span> of ' + allJobs.length + ' jobs';
  renderSummary();
  renderSections();
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.style.display = 'none';
  const dash = document.getElementById('dashboard');
  if (dash) dash.style.display = 'block';
  const pubBtn = document.getElementById('publishBtn');
  if (pubBtn) pubBtn.style.display = 'inline-block';
  if (typeof toast === 'function') toast('✓ ' + allJobs.length + ' jobs loaded');
}

function clearData() {
  allJobs = [];
  const statusDot = document.getElementById('statusDot');
  if (statusDot) statusDot.className = 'status-dot';
  const statusText = document.getElementById('statusText');
  if (statusText) { statusText.className  = 'status-text'; statusText.textContent = 'Not loaded'; }
  const dropCardEl = document.getElementById('dropCard');
  if (dropCardEl) dropCardEl.classList.remove('loaded');
  const pubBtn = document.getElementById('publishBtn');
  if (pubBtn) pubBtn.style.display = 'none';
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.style.display = '';
  const dash = document.getElementById('dashboard');
  if (dash) dash.style.display = 'none';
  const banner = document.getElementById('unrecBanner');
  if (banner) banner.classList.remove('show');
}

// ── DIVISION SELECTOR ────────────────────────────────────────────────────────
function setDiv(btn) {
  currentDiv = btn.dataset.div;
  document.querySelectorAll('.div-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const hdrSub = document.getElementById('hdrSub');
  if (hdrSub) {
    hdrSub.textContent = currentDiv === 'ALL'
      ? (allJobs.length ? allJobs.length + ' jobs loaded — All Divisions' : 'All Divisions')
      : btn.textContent.trim() + ' Division';
  }
  applyFilters();
}

// ── FLAGS (Warning / Over Budget) ────────────────────────────────────────────
function setFlag(m) {
  flagMode = m;
  ['All','Warning','Over'].forEach(k => {
    const el = document.getElementById('flag'+k);
    if (el) el.classList.remove('active');
  });
  const target = document.getElementById('flag' + m.charAt(0).toUpperCase() + m.slice(1));
  if (target) target.classList.add('active');
  applyFilters();
}

// ── FILTER ENGINE ────────────────────────────────────────────────────────────
function applyFilters() {
  const searchEl = document.getElementById('searchInp');
  const q = (searchEl ? searchEl.value : '').toLowerCase();
  filteredJobs = allJobs.filter(j => {
    if (currentDiv !== 'ALL' && j.divKey !== currentDiv) return false;
    if (flagMode === 'warning' && j.tier !== 'warning') return false;
    if (flagMode === 'over' && j.tier !== 'over') return false;
    if (q && !j.jobName.toLowerCase().includes(q) && !j.jobNum.toLowerCase().includes(q) &&
        !j.foreman.toLowerCase().includes(q)) return false;
    return true;
  });
  const filterInfoEl = document.getElementById('filterInfo');
  if (filterInfoEl) {
    filterInfoEl.innerHTML =
      'Showing <span>' + filteredJobs.length + '</span> of ' + allJobs.length + ' jobs';
  }
  renderSummary();
  renderSections();
}

// ── SUMMARY / KPI CARDS / DONUT ──────────────────────────────────────────────
// On-Budget Rate (inclusive) = (on + warning) / graded
// $ Variance = sum of (ceilingDollars - cost) across graded jobs
// Graded = jobs with both an estimate AND a known ceiling.
// Ungraded jobs (unknown subdiv or no estimate) are excluded from the rate.
function renderSummary() {
  // Graded subset: only jobs with both estimates and a known ceiling.
  const graded = filteredJobs.filter(j => j.tier !== 'na');
  const onCount = graded.filter(j => j.tier === 'on').length;
  const warnCount = graded.filter(j => j.tier === 'warning').length;
  const overCount = graded.filter(j => j.tier === 'over').length;
  const ungraded = filteredJobs.length - graded.length;

  const onBudgetRate = graded.length > 0 ? ((onCount + warnCount) / graded.length * 100) : 0;
  const varianceTotal = graded.reduce((s, j) => s + (j.varianceDollars || 0), 0);

  const rateClass = onBudgetRate >= 80 ? 'green' : onBudgetRate >= 60 ? 'orange' : onBudgetRate >= 40 ? 'yellow' : 'red';
  const rateBarCol = onBudgetRate >= 80 ? C.great : onBudgetRate >= 60 ? C.ok : onBudgetRate >= 40 ? C.watch : C.alert;
  const varClass = varianceTotal >= 0 ? 'green' : 'red';
  const varBarCol = varianceTotal >= 0 ? C.great : C.alert;

  const kpiLeftEl = document.getElementById('kpiLeft');
  if (kpiLeftEl) {
    kpiLeftEl.innerHTML =
      `<div class="kpi"><div class="kpi-bar" style="background:${rateBarCol}"></div>
        <div class="kpi-lbl">On-Budget Rate</div>
        <div class="kpi-val ${rateClass}">${onBudgetRate.toFixed(1)}%</div>
        <div class="kpi-note">${graded.length} graded job${graded.length!==1?'s':''}${ungraded>0?' · '+ungraded+' ungraded':''}</div></div>` +
      `<div class="kpi"><div class="kpi-bar" style="background:${varBarCol}"></div>
        <div class="kpi-lbl" title="+ = under budget · − = over budget">$ Variance vs Budget</div>
        <div class="kpi-val ${varClass}">${varianceTotal>=0?'+':'-'}${fmt$(Math.abs(varianceTotal))}</div>
        <div class="kpi-note">${varianceTotal>=0?'Under':'Over'} division budget</div></div>`;
  }

  const kpiRightEl = document.getElementById('kpiRight');
  if (kpiRightEl) {
    kpiRightEl.innerHTML =
      `<div class="kpi kpi-clickable" onclick="openDrilldown('warning')">
        <div class="kpi-bar" style="background:#facc15"></div>
        <div class="kpi-lbl">Warning ⚠️</div>
        <div class="kpi-val yellow">${warnCount}</div>
        <div class="kpi-note">Within 10% of budget · tap to drill</div></div>` +
      `<div class="kpi kpi-clickable" onclick="openDrilldown('over')">
        <div class="kpi-bar" style="background:#f87171"></div>
        <div class="kpi-lbl">Over Budget 🚨</div>
        <div class="kpi-val red">${overCount}</div>
        <div class="kpi-note">Past budget · tap to drill</div></div>`;
  }

  // Donut: 3 segments (over / warning / on), plus optional ungraded grey wedge
  const b = {on: onCount, warning: warnCount, over: overCount, na: ungraded};
  const T = Math.max(b.on + b.warning + b.over + b.na, 1), circ = 314.16;
  let off = 0;
  // Order: over (red), warning (yellow), on (green), na (grey-rendered as ok stroke since slot remains)
  const segs = [
    {id:'d-alert', val:b.over},
    {id:'d-watch', val:b.warning},
    {id:'d-great', val:b.on},
    {id:'d-ok',    val:b.na}
  ];
  segs.forEach(s => {
    const seg = (s.val / T) * circ;
    const el  = document.getElementById(s.id);
    if (el) {
      el.setAttribute('stroke-dasharray',  seg + ' ' + (circ - seg));
      el.setAttribute('stroke-dashoffset', -off);
    }
    off += seg;
  });
  // Color the "na" slot grey at runtime (it uses the d-ok slot which was originally orange)
  const dOk = document.getElementById('d-ok');
  if (dOk) dOk.setAttribute('stroke', '#3a3a3a');

  const donutTotalEl = document.getElementById('donutTotal');
  if (donutTotalEl) donutTotalEl.textContent = filteredJobs.length;
  const donutLegendEl = document.getElementById('donutLegend');
  if (donutLegendEl) {
    donutLegendEl.innerHTML =
      `<div class="donut-leg-item"><div class="donut-leg-dot" style="background:${C.great}"></div>On Budget (${b.on})</div>` +
      `<div class="donut-leg-item"><div class="donut-leg-dot" style="background:${C.watch}"></div>Warning (${b.warning})</div>` +
      `<div class="donut-leg-item"><div class="donut-leg-dot" style="background:${C.alert}"></div>Over (${b.over})</div>` +
      (b.na > 0 ? `<div class="donut-leg-item"><div class="donut-leg-dot" style="background:#3a3a3a"></div>Ungraded (${b.na})</div>` : '');
  }
  // ── GP overlay (Push 1.2): Portfolio GP% + Working GP$ ─────────────────────
  const gpEst   = graded.reduce((s, j) => s + (j.estimates || 0), 0);
  const gpCost  = graded.reduce((s, j) => s + (j.jobCost   || 0), 0);
  const gpDollars = gpEst - gpCost;
  const gpPct = gpEst > 0 ? (gpDollars / gpEst * 100) : 0;
  const gpPctClass = gpPct >= 50 ? 'green' : gpPct >= 35 ? 'orange' : gpPct >= 20 ? 'yellow' : 'red';
  const gpPctBar   = gpPct >= 50 ? C.great : gpPct >= 35 ? C.ok    : gpPct >= 20 ? C.watch  : C.alert;
  const gpDollarsClass = gpDollars >= 0 ? 'green' : 'red';
  const gpDollarsBar   = gpDollars >= 0 ? C.great : C.alert;
  const gpLeftEl = document.getElementById('gpKpiLeft');
  if (gpLeftEl) {
    gpLeftEl.innerHTML =
      `<div class="kpi"><div class="kpi-bar" style="background:${gpPctBar}"></div>
        <div class="kpi-lbl">Portfolio GP%</div>
        <div class="kpi-val ${gpPctClass}">${gpPct.toFixed(1)}%</div>
        <div class="kpi-note">${graded.length} graded job${graded.length!==1?'s':''}</div></div>` +
      `<div class="kpi"><div class="kpi-bar" style="background:${gpDollarsBar}"></div>
        <div class="kpi-lbl">Working GP $</div>
        <div class="kpi-val ${gpDollarsClass}">${gpDollars>=0?'+':'-'}${fmt$(Math.abs(gpDollars))}</div>
        <div class="kpi-note">Estimate − Job Costs</div></div>`;
  }
  const gpRightEl = document.getElementById('gpKpiRight');
  if (gpRightEl) gpRightEl.innerHTML = '';
}

// ── FOREMAN SECTIONS ─────────────────────────────────────────────────────────
// Per-foreman bar = On-Budget Rate (inclusive) for that foreman's graded jobs.
// Per-foreman dollar value = sum of $ Variance (under = green, over = red).
function renderSections() {
  const map = {};
  filteredJobs.forEach(j => {
    const k = j.foreman && j.foreman.trim() && j.foreman !== ' ' ? j.foreman : '__unassigned__';
    if (!map[k]) map[k] = [];
    map[k].push(j);
  });
  // Sort: lowest On-Budget Rate first (most urgent at top); unassigned last
  const sorted = Object.entries(map).sort((a,b) => {
    if (a[0]==='__unassigned__') return 1;
    if (b[0]==='__unassigned__') return -1;
    return foremanOnBudgetRate(a[1]) - foremanOnBudgetRate(b[1]);
  });
  const container = document.getElementById('foremanSections');
  if (!sorted.length) {
    if (container) container.innerHTML = '<div class="no-results">No jobs match the current filters.</div>';
    return;
  }
  let html = '';
  sorted.forEach(([name, jobs]) => {
    const unassigned = name === '__unassigned__';
    const dname = unassigned ? 'Unassigned / No Foreperson' : name;
    const rate  = foremanOnBudgetRate(jobs);
    const variance = jobs.reduce((s,j) => s + (j.varianceDollars || 0), 0);
    const gradedCount = jobs.filter(j => j.tier !== 'na').length;
    const col   = unassigned ? '#555' : (rate>=80?C.great:rate>=60?C.ok:rate>=40?C.watch:C.alert);
    const avBg  = unassigned ? '#1a1a1a' : col;
    const avFg  = unassigned ? '#555' : '#000';
    const init  = unassigned ? '?' : name.split(' ').filter(Boolean).map(p=>p[0]).join('').substring(0,2).toUpperCase();
    const overs    = jobs.filter(j => j.tier === 'over').length;
    const warnings = jobs.filter(j => j.tier === 'warning').length;
    const af = overs    ? `<span style="font-size:10px;background:rgba(248,113,113,0.12);color:#f87171;border-radius:4px;padding:2px 7px;">🚨 ${overs}</span>` : '';
    const wf = warnings ? `<span style="font-size:10px;background:rgba(250,204,21,0.1);color:#facc15;border-radius:4px;padding:2px 7px;">⚠️ ${warnings}</span>` : '';
    // Job sort: over → warning → on → na (ungraded last); within tier, worst cost% margin first
    const sortedJobs = [...jobs].sort((a,b) => {
      const order = {over:0, warning:1, on:2, na:3};
      if (order[a.tier] !== order[b.tier]) return order[a.tier] - order[b.tier];
      if (a.tier === 'na' || b.tier === 'na') return 0;
      // Inside a tier: largest overshoot first for over; closest-to-ceiling first for warning; smallest margin first for on
      const aMargin = a.ceiling - a.costPct; // positive = under, negative = over
      const bMargin = b.ceiling - b.costPct;
      return aMargin - bMargin;
    });
    const varianceStr = (variance >= 0 ? '+' : '-') + fmt$(Math.abs(variance));
    const varianceCol = variance >= 0 ? C.great : C.alert;
    html += `<div class="foreman-section">
      <div class="foreman-header" onclick="toggle(this)">
        <div class="foreman-initials" style="background:${avBg};color:${avFg}">${init}</div>
        <div class="foreman-name-wrap">
          <div class="foreman-name">${dname} ${af}${wf}</div>
          <div class="foreman-meta">${jobs.length} job${jobs.length!==1?'s':''} · ${gradedCount} graded · <span style="color:${varianceCol}">${varianceStr}</span> vs budget</div>
        </div>
        <div class="foreman-bar-wrap">
          <div class="foreman-bar-track"><div class="foreman-bar-fill" style="width:${Math.min(Math.max(unassigned?0:rate,0),100)}%;background:${col}"></div></div>
          <div class="foreman-bar-pct" style="color:${col}">${unassigned||gradedCount===0?'—':rate.toFixed(0)+'% on'}</div>
        </div>
        <div class="foreman-gp-val" style="color:${col}">${unassigned||gradedCount===0?'—':rate.toFixed(0)+'%'}</div>
        <span class="chevron">▼</span>
      </div>
      <div class="foreman-jobs">
        <table class="job-table"><thead><tr>
          <th class="stripe"></th>
          <th>Job #</th><th class="col-job-name">Job Name</th><th>Subdivision</th>
          <th style="text-align:right">Est. Value</th>
          <th style="text-align:right">Job Cost</th>
          <th style="text-align:right">Cost %</th>
          <th style="text-align:right">Budget %</th>
          <th style="text-align:right">$ Variance</th>
          <th style="text-align:right">Age</th>
          <th class="gp-col" style="text-align:right">GP $</th>
          <th class="gp-col" style="text-align:right">GP %</th>
          <th style="text-align:right">Status</th>
        </tr></thead><tbody>${sortedJobs.map(jobRow).join('')}</tbody></table>
        <div class="job-cards">${sortedJobs.map(jobCard).join('')}</div>
      </div></div>`;
  });
  if (container) container.innerHTML = html;
}

function toggle(hdr) {
  const jobs = hdr.nextElementSibling, chev = hdr.querySelector('.chevron');
  jobs.classList.toggle('open');
  chev.classList.toggle('open');
}

function jobRow(j) {
  const col = tierColor(j.tier);
  const costPctStr  = (j.costPct !== null && j.costPct !== undefined) ? (j.costPct*100).toFixed(1)+'%' : '<span style="color:#555">—</span>';
  const ceilingStr  = (j.ceiling !== null && j.ceiling !== undefined) ? (j.ceiling*100).toFixed(0)+'%' : '<span style="color:#555">—</span>';
  const varStr      = (j.varianceDollars !== null && j.varianceDollars !== undefined)
    ? `<span class="dollar-val" style="color:${j.varianceDollars<0?C.alert:'inherit'}">${j.varianceDollars>=0?'+':'-'}${fmt$(Math.abs(j.varianceDollars))}</span>`
    : '<span style="color:#555">—</span>';
  // Age in WIP — matches PC Hub Pending Sales tier colors
  const d = j.daysInWip;
  const ageCls = (d === null || d === undefined) ? '' : (d > 180 ? 'red' : d > 90 ? 'yellow' : d > 30 ? 'orange' : 'green');
  const ageStr = (d === null || d === undefined) ? '<span style="color:#555">—</span>' : `<span class="jl-days ${ageCls}">${d}d</span>`;
  return `<tr>
    <td class="stripe"><div style="width:4px;height:34px;border-radius:2px;background:${col}"></div></td>
    <td><span class="job-num">${j.jobNum}</span></td>
    <td class="col-job-name"><span class="job-name" title="${j.jobName}">${j.jobName||'—'}</span></td>
    <td><span class="div-pill">${j.rawDiv}</span></td>
    <td style="text-align:right"><span class="dollar-val">${j.estimates>0?fmt$(j.estimates):'<span style=\"color:#555\">—</span>'}</span></td>
    <td style="text-align:right"><span class="dollar-val">${j.jobCost>0?fmt$(j.jobCost):'<span style=\"color:#555\">—</span>'}</span></td>
    <td style="text-align:right">${costPctStr}</td>
    <td style="text-align:right">${ceilingStr}</td>
    <td style="text-align:right">${varStr}</td>
    <td style="text-align:right">${ageStr}</td>
    <td class="gp-col" style="text-align:right"><span class="dollar-val" style="color:${j.gpDollar<0?C.alert:'inherit'}">${j.estimates>0?fmt$(j.gpDollar):'—'}</span></td>
    <td class="gp-col" style="text-align:right">${j.estimates>0?(j.gpPct||0).toFixed(1)+'%':'—'}</td>
    <td style="text-align:right">${tierBadge(j.tier)}</td>
  </tr>`;
}

// Mobile card layout. Same data as jobRow, restructured for narrow screens.
function jobCard(j) {
  const col = tierColor(j.tier);
  const costPctStr  = (j.costPct !== null && j.costPct !== undefined) ? (j.costPct*100).toFixed(1)+'%' : '—';
  const ceilingStr  = (j.ceiling !== null && j.ceiling !== undefined) ? (j.ceiling*100).toFixed(0)+'%' : '—';
  const estStr      = j.estimates>0 ? fmt$(j.estimates) : '—';
  const costStr     = j.jobCost>0  ? fmt$(j.jobCost)  : '—';
  const varStr      = (j.varianceDollars !== null && j.varianceDollars !== undefined)
    ? `<span style=\"color:${j.varianceDollars<0?C.alert:C.great}\">${j.varianceDollars>=0?'+':'-'}${fmt$(Math.abs(j.varianceDollars))}</span>`
    : '<span style=\"color:#555\">—</span>';
  // Age in WIP — matches PC Hub Pending Sales tier colors
  const d = j.daysInWip;
  const ageCls = (d === null || d === undefined) ? '' : (d > 180 ? 'red' : d > 90 ? 'yellow' : d > 30 ? 'orange' : 'green');
  const ageStr = (d === null || d === undefined) ? '—' : `<span class=\"jl-days ${ageCls}\">${d}d</span>`;
  return `<div class=\"job-card\" style=\"border-left-color:${col}\">
    <div class=\"jc-hdr\">
      <div class=\"jc-id\">
        <span class=\"job-num\">#${j.jobNum}</span>
        <span class=\"jc-name\" title=\"${j.jobName}\">${j.jobName||'—'}</span>
      </div>
      <div class=\"jc-badge\">${tierBadge(j.tier)}</div>
    </div>
    <div class=\"jc-sub\"><span class=\"div-pill\">${j.rawDiv}</span></div>
    <div class=\"jc-grid\">
      <div class=\"jc-cell\"><div class=\"jc-lbl\">Est. Value</div><div class=\"jc-val\">${estStr}</div></div>
      <div class=\"jc-cell\"><div class=\"jc-lbl\">Cost %</div><div class=\"jc-val\">${costPctStr}</div></div>
      <div class=\"jc-cell\"><div class=\"jc-lbl\">Job Cost</div><div class=\"jc-val\">${costStr}</div></div>
      <div class=\"jc-cell\"><div class=\"jc-lbl\">Budget %</div><div class=\"jc-val\">${ceilingStr}</div></div>
      <div class=\"jc-cell\"><div class=\"jc-lbl\">Age in WIP</div><div class=\"jc-val\">${ageStr}</div></div>
    </div>
    <div class=\"jc-variance\">
      <span class=\"jc-lbl\">$ Variance</span>
      <span class=\"jc-var-val\">${varStr}</span>
    </div>
  </div>`;
}

function tierBadge(tier) {
  if (tier === 'on')      return '<span class="gp-badge gp-great">On Budget</span>';
  if (tier === 'warning') return '<span class="gp-badge gp-watch">⚠️ Warning</span>';
  if (tier === 'over')    return '<span class="gp-badge gp-alert">🚨 Over</span>';
  return '<span class="gp-badge gp-zero">—</span>';
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function foremanOnBudgetRate(jobs) {
  const graded = jobs.filter(j => j.tier !== 'na');
  if (!graded.length) return 0;
  const ok = graded.filter(j => j.tier === 'on' || j.tier === 'warning').length;
  return ok / graded.length * 100;
}
function fmt$(n) {
  if (Math.abs(n)>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if (Math.abs(n)>=1000)    return '$'+Math.round(n).toLocaleString();
  return '$'+Math.round(n);
}

// ── DRILLDOWN MODAL ─────────────────────────────────────────────────────────
function openDrilldown(mode) {
  // mode: 'warning' | 'over'
  const isOver = mode === 'over';
  const label  = isOver ? '🚨 Over Budget — Past Budget' : '⚠️ Warning — Within 10% of Budget';
  const targetTier = isOver ? 'over' : 'warning';
  const jobs = filteredJobs
    .filter(j => j.tier === targetTier)
    .sort((a,b) => {
      const aM = a.ceiling - a.costPct;
      const bM = b.ceiling - b.costPct;
      return aM - bM; // most over (most negative margin) first
    });

  document.getElementById('modalTitle').textContent = label;
  document.getElementById('modalSub').textContent =
    jobs.length + ' job' + (jobs.length!==1?'s':'') + (currentDiv !== 'ALL' ? ' · ' + document.querySelector('.div-btn.active').textContent.trim() : ' · All Divisions');

  let body = '';
  if (!jobs.length) {
    body = '<div class="modal-empty">No jobs in this tier. Great shape! ✅</div>';
  } else {
    body = `<table class="modal-job-table"><thead><tr>
      <th></th><th>Cost %</th><th>Budget %</th><th>Job #</th><th>Job Name</th><th>Subdivision</th><th>Foreman</th>
      <th style="text-align:right">Est. Value</th><th style="text-align:right">$ Variance</th><th style="text-align:right">Age</th><th class="gp-col" style="text-align:right">GP $</th><th class="gp-col" style="text-align:right">GP %</th>
    </tr></thead><tbody>`;
    jobs.forEach(j => {
      const icon = j.tier === 'over' ? '🚨' : '⚠️';
      const badgeCls = j.tier === 'over' ? 'gp-alert' : 'gp-watch';
      const costPctStr = (j.costPct*100).toFixed(1)+'%';
      const ceilingStr = (j.ceiling*100).toFixed(0)+'%';
      // Age in WIP — matches PC Hub Pending Sales tier colors
      const d = j.daysInWip;
      const ageCls = (d === null || d === undefined) ? '' : (d > 180 ? 'red' : d > 90 ? 'yellow' : d > 30 ? 'orange' : 'green');
      const ageStr = (d === null || d === undefined) ? '<span style="color:#555">—</span>' : `<span class="jl-days ${ageCls}">${d}d</span>`;
      body += `<tr>
        <td style="padding-left:10px">${icon}</td>
        <td><span class="gp-badge ${badgeCls}">${costPctStr}</span></td>
        <td style="font-size:11px;color:#aaa">${ceilingStr}</td>
        <td><span class="job-num">${j.jobNum}</span></td>
        <td><span class="job-name" title="${j.jobName}" style="max-width:200px">${j.jobName||'—'}</span></td>
        <td><span class="div-pill">${j.rawDiv}</span></td>
        <td style="font-size:11px;color:#aaa">${j.foreman||'—'}</td>
        <td style="text-align:right"><span class="dollar-val">${fmt$(j.estimates)}</span></td>
        <td style="text-align:right"><span class="dollar-val" style="color:${j.varianceDollars<0?C.alert:'inherit'}">${j.varianceDollars>=0?'+':'-'}${fmt$(Math.abs(j.varianceDollars))}</span></td>
        <td style="text-align:right">${ageStr}</td>
        <td class="gp-col" style="text-align:right"><span class="dollar-val" style="color:${j.gpDollar<0?C.alert:'inherit'}">${fmt$(j.gpDollar||0)}</span></td>
        <td class="gp-col" style="text-align:right">${(j.gpPct||0).toFixed(1)}%</td>
      </tr>`;
    });
    body += '</tbody></table>';
  }
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('drillModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrilldown(e) {
  if (e && e.target !== document.getElementById('drillModal')) return;
  document.getElementById('drillModal').classList.remove('open');
  document.body.style.overflow = '';
}
// ── GP TOGGLE (Push 1.2) ────────────────────────────────────────────────────
function toggleGP() {
  document.body.classList.toggle('gp-on');
  const gear = document.getElementById('gearBtn');
  if (gear) gear.classList.toggle('on', document.body.classList.contains('gp-on'));
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrilldown(null); });

// ── BOOT (published view only) ──────────────────────────────────────────────
(function init() {
  const rawData = document.getElementById('wip-data');
  const rawMeta = document.getElementById('wip-meta');
  if (!rawData) return; // not in published view
  const INJECTED_DATA = JSON.parse(rawData.textContent);
  const INJECTED_META = rawMeta ? JSON.parse(rawMeta.textContent) : {};
  if (!INJECTED_DATA || !INJECTED_DATA.length) {
    const nd = document.getElementById('noData');
    if (nd) nd.style.display = '';
    return;
  }
  // Re-compute per-job budget fields on the injected data
  // (publisher serializes raw fields; we recompute ceiling/tier client-side)
  allJobs = INJECTED_DATA.map(j => {
    const rawDiv = j.rawDiv || '';
    const ceiling = ceilingForSubdiv(rawDiv);
    const est = j.estimates || 0;
    const cost = j.jobCost || 0;
    const costPct = est > 0 ? (cost / est) : null;
    const ceilingDollars = (ceiling !== null && est > 0) ? est * ceiling : null;
    const varianceDollars = (ceilingDollars !== null) ? ceilingDollars - cost : null;
    const tier = budgetTier(costPct, ceiling);
    // Recompute daysInWip from dateStartedISO so age stays fresh on
    // every page load (rather than freezing at publish time).
    let daysInWip = (j.daysInWip === undefined) ? null : j.daysInWip;
    if (j.dateStartedISO) {
      const ds = new Date(j.dateStartedISO);
      if (!isNaN(ds)) {
        const ms = Date.now() - ds.getTime();
        daysInWip = Math.max(0, Math.floor(ms / 86400000));
      }
    }
    return Object.assign({}, j, { ceiling, costPct, ceilingDollars, varianceDollars, tier, daysInWip });
  });
  document.getElementById('updatedAt').textContent =
    INJECTED_META.updated ? 'Updated ' + INJECTED_META.updated : 'Live';
  document.getElementById('hdrSub').textContent =
    allJobs.length + ' active jobs';
  filteredJobs = [...allJobs];
  renderSummary();
  renderSections();
  document.getElementById('dashboard').style.display = '';
  const nd = document.getElementById('noData');
  if (nd) nd.style.display = 'none';
  document.getElementById('filterInfo').innerHTML =
    'Showing <span>' + filteredJobs.length + '</span> of ' + allJobs.length + ' jobs';
})();

</script>
</body>
